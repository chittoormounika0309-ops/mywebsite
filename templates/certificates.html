<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certifications</title>

<style>

/* Page background */
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f4c75,#00a8a8);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Grid container */
.cert-grid{
    width:900px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

/* Card */
.cert-card{
    background:white;
    padding:20px;
    border-radius:12px;
    display:flex;
    gap:15px;
    align-items:flex-start;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    transition:0.3s;
}

/* Hover animation */
.cert-card:hover{
    transform:translateY(-6px);
}

/* Icon */
.cert-ico{
    font-size:32px;
}

/* Title */
.cert-title{
    font-size:16px;
    font-weight:bold;
    color:#0f4c75;
}

/* Organization */
.cert-by{
    font-size:14px;
    color:#555;
}

/* Date */
.cert-date{
    font-size:13px;
    color:#777;
    margin-top:2px;
}

/* Badge */
.cert-badge{
    display:inline-block;
    margin-top:6px;
    font-size:12px;
    background:#e6f7f7;
    color:#0f4c75;
    padding:3px 8px;
    border-radius:6px;
}

</style>

</head>

<body>

<div class="cert-grid">

<div class="cert-card">
<div class="cert-ico">☁️</div>
<div>
<div class="cert-title">AWS Cloud Practitioner</div>
<div class="cert-by">Amazon Web Services</div>
<div class="cert-date">Dec 2024</div>
<span class="cert-badge">✓ Verified</span>
</div>
</div>

<div class="cert-card">
<div class="cert-ico">⚛️</div>
<div>
<div class="cert-title">React — Complete Guide</div>
<div class="cert-by">Udemy / Academind</div>
<div class="cert-date">Oct 2024</div>
<span class="cert-badge">✓ Verified</span>
</div>
</div>

<div class="cert-card">
<div class="cert-ico">🐍</div>
<div>
<div class="cert-title">Python for Everybody</div>
<div class="cert-by">Coursera / U of Michigan</div>
<div class="cert-date">Aug 2024</div>
<span class="cert-badge">✓ Verified</span>
</div>
</div>

<div class="cert-card">
<div class="cert-ico">🔷</div>
<div>
<div class="cert-title">JavaScript Algorithms & DS</div>
<div class="cert-by">freeCodeCamp</div>
<div class="cert-date">Jun 2024</div>
<span class="cert-badge">✓ Verified</span>
</div>
</div>

</div>

</body>
</html>
